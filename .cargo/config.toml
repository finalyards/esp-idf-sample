[build]
target = "riscv32imac-esp-espidf"

[target.riscv32imac-esp-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"
rustflags = ["--cfg",  "espidf_time64"] # must be set for ESP-IDF 5.0 and above

[unstable]
build-std = ["std", "panic_abort"]

[env]
MCU="esp32c6"
esp_idf_version = "v5.5.3"
#esp_idf_version = "v5.4.2"
#esp_idf_version = "v5.3.3"
